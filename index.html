<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家 · 家庭面板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8F4EC;
    --card:#FFFDF8;
    --ink:#5B564C;
    --ink-soft:#A09889;
    --line:#EFE8DB;
    --matcha:#9DB89A;
    --matcha-deep:#7C9B78;
    --sakura:#E8B7BC;
    --sora:#A9C3D4;
    --anzu:#E6C079;
    --anzu-deep:#D0A34F;
    --danger:#D08770;
    --radius:18px;
    --shadow:0 2px 14px rgba(130,118,95,.09);
    --round:"Zen Maru Gothic","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--round);min-height:100vh;padding-bottom:48px}

  /* ---------- 顶栏 ---------- */
  header{max-width:1080px;margin:0 auto;padding:30px 20px 8px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .brand{display:flex;align-items:center;gap:14px}
  .seal{width:56px;height:56px;border-radius:20px;background:var(--matcha);color:#FFFDF8;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .datebox .greet{font-size:13px;color:var(--ink-soft);letter-spacing:.06em}
  .datebox .today{font-size:24px;font-weight:700;line-height:1.3;letter-spacing:.02em}
  .members{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .member-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px 6px 9px;font-size:13px;box-shadow:var(--shadow)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .member-chip button{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;font-family:var(--round)}
  .member-chip button.confirming{color:var(--danger);font-weight:700}
  .add-member{border:1.5px dashed var(--ink-soft);background:none;border-radius:999px;padding:6px 13px;font-size:13px;color:var(--ink-soft);cursor:pointer;font-family:var(--round)}
  .add-member:hover{color:var(--matcha-deep);border-color:var(--matcha-deep)}
  .inline-add{display:none;align-items:center;gap:6px}
  .inline-add.open{display:flex}
  .inline-add input{width:110px}

  /* ---------- 网格 ---------- */
  main{max-width:1080px;margin:18px auto 0;padding:0 20px;display:grid;grid-template-columns:1.15fr .85fr;gap:20px}
  @media(max-width:760px){main{grid-template-columns:1fr}}
  .col{display:flex;flex-direction:column;gap:20px;min-width:0}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 20px 16px}
  .card h2{font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:13px;letter-spacing:.03em}
  .card h2 .count{font-weight:500;font-size:12px;color:var(--ink-soft)}
  .card h2::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--matcha)}
  .card.c-anzu h2::before{background:var(--anzu)}
  .card.c-sakura h2::before{background:var(--sakura)}
  .card.c-sora h2::before{background:var(--sora)}

  /* ---------- 输入 ---------- */
  .row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  input[type=text],input[type=date],input[type=time],select{
    font-family:var(--round);font-size:14px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:12px;padding:8px 11px;background:#FFFEFB;min-width:0
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--matcha);box-shadow:0 0 0 3px rgba(157,184,154,.22)}
  input.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(208,135,112,.2)}
  .grow{flex:1 1 140px}
  .btn{border:none;border-radius:999px;background:var(--matcha);color:#fff;font-size:14px;padding:8px 18px;cursor:pointer;font-family:var(--round);flex:none;font-weight:500;letter-spacing:.05em}
  .btn:hover{background:var(--matcha-deep)}
  .btn:focus-visible{outline:2px solid var(--anzu);outline-offset:2px}
  .btn.small{padding:6px 14px;font-size:13px}

  /* ---------- 列表 ---------- */
  ul{list-style:none}
  li.item{display:flex;align-items:flex-start;gap:10px;padding:10px 4px;border-bottom:1.5px dashed var(--line)}
  li.item:last-child{border-bottom:none}
  li.item .main{flex:1;min-width:0}
  li.item .title{font-size:14.5px;word-break:break-word}
  li.item .meta{font-size:12px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  li.item.done .title{text-decoration:line-through;color:var(--ink-soft)}
  .del{border:none;background:none;color:#CFC8BB;cursor:pointer;font-size:15px;line-height:1;padding:2px;font-family:var(--round)}
  .del:hover{color:var(--danger)}
  input[type=checkbox]{width:19px;height:19px;accent-color:var(--matcha-deep);margin-top:2px;cursor:pointer;flex:none;border-radius:50%}
  .empty{color:var(--ink-soft);font-size:13.5px;padding:10px 4px;line-height:1.7}

  /* 日程日期徽标 */
  .datechip{flex:none;width:52px;text-align:center;background:var(--bg);border-radius:14px;padding:7px 2px}
  .datechip .d{font-size:19px;font-weight:700;line-height:1.1}
  .datechip .m{font-size:11px;color:var(--ink-soft)}
  .datechip.today-chip{background:var(--anzu);color:#5C431A}
  .datechip.today-chip .m{color:#8A6A33}
  .past{opacity:.45}

  /* 财务 */
  .budget-box{background:var(--bg);border-radius:14px;padding:13px 15px;margin-bottom:12px}
  .budget-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink-soft);margin-bottom:9px;flex-wrap:wrap;gap:6px}
  .linkbtn{border:none;background:none;color:var(--matcha-deep);cursor:pointer;font-size:13px;padding:0;font-family:var(--round);font-weight:500}
  .linkbtn:hover{text-decoration:underline}
  .tabs,.seg{display:flex;background:#ECE5D6;border-radius:999px;padding:3px;gap:2px;flex:none}
  .tabs button,.seg button{border:none;background:none;font-family:var(--round);font-size:12.5px;color:var(--ink-soft);padding:4px 13px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--card);color:var(--ink);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .seg button.on-exp{background:var(--card);color:var(--danger);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .seg button.on-inc{background:var(--card);color:var(--matcha-deep);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .budget-bar{height:10px;background:#EBE4D6;border-radius:5px;overflow:hidden}
  .budget-fill{height:100%;border-radius:5px;background:var(--matcha);width:0;transition:width .4s ease}
  .budget-stat{font-size:13px;margin-top:9px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
  .amt{font-weight:700;font-size:15px;flex:none;white-space:nowrap}
  .amt.inc{color:var(--matcha-deep)}
  .bcat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);margin:6px 0}
  .bcat .cname{flex:none;width:58px;color:var(--ink)}
  .bcat .bar{flex:1;height:7px;background:#F1EBDF;border-radius:4px;overflow:hidden}
  .bcat .bar i{display:block;height:100%;border-radius:4px}
  .bcat .cval{flex:none;min-width:104px;text-align:right}
  .budget-grid{display:none;grid-template-columns:repeat(3,1fr);gap:8px;margin:4px 0 12px}
  .budget-grid.open{display:grid}
  .budget-grid label{font-size:12px;color:var(--ink-soft);display:flex;flex-direction:column;gap:3px}
  .budget-grid input{width:100%}
  .budget-grid .saverow{grid-column:1/-1;display:flex;justify-content:flex-end}
  .fin-summary{display:flex;justify-content:space-between;background:var(--bg);border-radius:14px;padding:10px 12px;margin-bottom:12px;font-size:12.5px;text-align:center;gap:8px;color:var(--ink-soft)}
  .fin-summary .kpi{flex:1;min-width:72px}
  .fin-summary .kpi .v{font-weight:700;font-size:16px;margin-top:2px;color:var(--ink)}

  /* 留言板 */
  .note{background:#FFF6EC;border:1.5px solid #F3E3CC;border-radius:14px;padding:11px 13px;margin-bottom:10px;position:relative}
  .note::before{content:"";position:absolute;top:-6px;left:16px;width:12px;height:12px;border-radius:50%;background:var(--sakura);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .note .txt{font-size:14px;white-space:pre-wrap;word-break:break-word;line-height:1.7}
  .note .by{font-size:12px;color:var(--ink-soft);margin-top:7px;display:flex;justify-content:space-between;align-items:center}
  textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:9px 11px;font-family:var(--round);font-size:14px;background:#FFFEFB;resize:vertical;min-height:56px;color:var(--ink)}

  /* 轻提示 */
  #toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);background:#6B655A;color:#FFFDF8;font-size:13.5px;padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:all .3s ease;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.15)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .savenote{max-width:1080px;margin:16px auto 0;padding:0 20px;font-size:12px;color:var(--ink-soft);text-align:center;letter-spacing:.04em}
  @media(prefers-reduced-motion:no-preference){
    .card{animation:rise .4s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }

  /* ---------- Family 3D Showcase ---------- */
  .hero{position:relative;overflow:hidden;height:min(92vh,700px);min-height:520px;
    background:#79B865;transition:background .6s ease;color:#fff;user-select:none}
  .hero .bigword{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',var(--round);font-weight:700;font-size:clamp(90px,22vw,300px);
    color:rgba(255,255,255,.85);letter-spacing:.02em;line-height:1;pointer-events:none;
    text-transform:uppercase;transform:translateY(-8%)}
  .char-stage{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center}
  .char-pod{position:relative;height:92%;display:flex;align-items:flex-end;justify-content:center;
    perspective:1000px;padding-bottom:34px;cursor:grab}
  .char-pod.dragging{cursor:grabbing}
  .podfx{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(420px,86vw);
    height:130px;pointer-events:none}
  .pod-spot{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    width:150%;height:520px;background:radial-gradient(ellipse 50% 60% at 50% 100%,rgba(255,255,255,.22),transparent 70%)}
  .pod-glow{position:absolute;inset:auto 0 8px 0;height:90px;border-radius:50%;
    background:radial-gradient(ellipse at center,rgba(255,255,255,.38),rgba(255,255,255,.06) 60%,transparent 75%)}
  .pod-disc{position:absolute;left:50%;bottom:16px;transform:translateX(-50%) scaleY(.32);
    width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.16),rgba(255,255,255,.04) 65%,transparent 72%);
    box-shadow:0 0 40px rgba(255,255,255,.18)}
  .ring-wrap{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%) scaleY(.32);
    width:360px;height:360px}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px dashed rgba(255,255,255,.65);
    animation:ringspin 16s linear infinite}
  .ring2{position:absolute;inset:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);
    animation:ringspin 10s linear infinite reverse}
  @keyframes ringspin{to{transform:rotate(360deg)}}
  .char-main{position:relative;z-index:2;height:100%;max-height:600px;width:auto;object-fit:contain;
    filter:drop-shadow(0 24px 40px rgba(0,0,0,.3));transform-origin:50% 100%;
    animation:swivel 7s ease-in-out infinite, bob 4.5s ease-in-out infinite;
    transition:opacity .35s ease;will-change:transform}
  .char-pod.dragging .char-main,.char-pod.held .char-main{animation:none}
  .char-main.switching{opacity:0}
  @keyframes swivel{0%,100%{transform:rotateY(-13deg)}50%{transform:rotateY(13deg)}}
  @keyframes bob{0%,100%{margin-bottom:0}50%{margin-bottom:12px}}
  @media(prefers-reduced-motion:reduce){.char-main,.ring,.ring2{animation:none}}
  .char-side{position:absolute;bottom:16%;height:30%;width:auto;object-fit:contain;
    opacity:.85;cursor:pointer;transition:transform .25s ease,opacity .25s ease;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,.25))}
  .char-side:hover{transform:translateY(-6px);opacity:1}
  .char-side.left{left:8%}
  .char-side.right{right:8%}
  .hero-caption{position:absolute;left:5%;bottom:7%;max-width:280px;z-index:3}
  .hero-caption .label{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px}
  .hero-caption .desc{font-size:11.5px;line-height:1.75;opacity:.92;margin-bottom:16px;font-weight:500}
  .hero-arrows{display:flex;gap:10px}
  .hero-arrows button{width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.75);
    background:rgba(255,255,255,.08);color:#fff;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s ease}
  .hero-arrows button:hover{background:#fff;color:#3a3a3a}
  .hero-arrows button:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .hero-discover{position:absolute;right:5%;bottom:7%;z-index:3;
    font-family:'Baloo 2',var(--round);font-weight:700;font-size:clamp(18px,2.6vw,26px);
    letter-spacing:.04em;color:#fff;background:none;border:none;cursor:pointer;
    text-transform:uppercase;padding:0;transition:opacity .2s}
  .hero-discover:hover{opacity:.75}
  .hero-discover:focus-visible{outline:2px solid #fff;outline-offset:4px}
  @media(max-width:640px){
    .hero{height:78vh;min-height:460px}
    .char-side{display:none}
    .hero-caption{max-width:200px}
    .hero-caption .desc{display:none}
    .hero-discover{font-size:15px}
  }
</style>
</head>
<body>

<section class="hero" id="familyHero">
  <div class="bigword" id="heroWord" aria-hidden="true">FAMILY</div>
  <div class="char-stage">
    <img class="char-side left" id="sideL" src="" alt="" title="Switch character">
    <div class="char-pod" id="charPod">
      <div class="podfx" aria-hidden="true">
        <div class="pod-spot"></div>
        <div class="ring-wrap"><div class="ring"></div><div class="ring2"></div></div>
        <div class="pod-disc"></div>
        <div class="pod-glow"></div>
      </div>
      <img class="char-main" id="charMain" src="" alt="3D family character" draggable="false">
    </div>
    <img class="char-side right" id="sideR" src="" alt="" title="Switch character">
  </div>
  <div class="hero-caption">
    <div class="label" id="heroLabel">Half-Kweah Family</div>
    <div class="desc" id="heroDesc"></div>
    <div class="hero-arrows">
      <button id="prevChar" aria-label="Previous character">&#8592;</button>
      <button id="nextChar" aria-label="Next character">&#8594;</button>
    </div>
  </div>
  <button class="hero-discover" onclick="document.getElementById('mainDash').scrollIntoView({behavior:'smooth'})">Discover &#8595;</button>
</section>

<header id="mainDash">
  <div class="brand">
    <div class="seal">家</div>
    <div class="datebox">
      <div class="greet" id="greet">你好</div>
      <div class="today" id="todayText"></div>
    </div>
  </div>
  <div class="members" id="membersBar"></div>
</header>

<main>
  <div class="col">
    <!-- 家庭日程 -->
    <section class="card">
      <h2>家庭日程 <span class="count" id="evCount"></span></h2>
      <div class="row">
        <input type="text" id="evTitle" class="grow" placeholder="例如:牙医预约、家长会…" maxlength="60">
        <input type="date" id="evDate">
        <input type="time" id="evTime">
        <select id="evMember"></select>
        <button class="btn" onclick="addEvent()">添加</button>
      </div>
      <ul id="evList"></ul>
    </section>

    <!-- 家庭财务 -->
    <section class="card c-anzu">
      <h2>家庭财务</h2>

      <div class="fin-summary">
        <div class="kpi"><div>本月收入</div><div class="v" id="sumInc" style="color:var(--matcha-deep)">¥0</div></div>
        <div class="kpi"><div>本月支出</div><div class="v" id="sumExp" style="color:var(--danger)">¥0</div></div>
        <div class="kpi"><div>本月结余</div><div class="v" id="sumNet">¥0</div></div>
      </div>

      <div class="budget-box">
        <div class="budget-top">
          <span style="display:flex;align-items:center;gap:10px">预算规划
            <span class="tabs">
              <button id="tabYear" onclick="switchBudgetView('year')">年度</button>
              <button id="tabMonth" onclick="switchBudgetView('month')">月度</button>
            </span>
          </span>
          <button class="linkbtn" onclick="toggleBudgetEdit()">设置预算</button>
        </div>
        <div class="budget-grid" id="budgetGrid"></div>
        <div class="budget-bar"><div class="budget-fill" id="budgetFill"></div></div>
        <div class="budget-stat" id="budgetStat"></div>
        <div id="budgetCats"></div>
      </div>

      <div class="row">
        <span class="seg">
          <button id="segExp" onclick="setRecType('exp')">支出</button>
          <button id="segInc" onclick="setRecType('inc')">收入</button>
        </span>
        <input type="text" id="expAmount" inputmode="decimal" placeholder="金额" style="width:78px">
        <select id="expCat"></select>
        <input type="date" id="expDate" style="width:132px" title="日期,默认今天">
        <input type="text" id="expNote" class="grow" placeholder="备注(可选)" maxlength="30">
        <select id="expMember"></select>
        <button class="btn" id="recBtn" onclick="addRecord()">记支出</button>
      </div>
      <ul id="expList"></ul>
    </section>

    <!-- 留言板 -->
    <section class="card c-sakura">
      <h2>家庭留言板</h2>
      <div class="row" style="flex-direction:column;align-items:stretch">
        <textarea id="noteText" placeholder="给家人留句话,比如:晚饭在锅里,记得热一下 ♡" maxlength="300"></textarea>
        <div class="row" style="margin-bottom:0">
          <select id="noteMember" class="grow"></select>
          <button class="btn" onclick="addNote()">贴上留言</button>
        </div>
      </div>
      <div id="noteList"></div>
    </section>
  </div>

  <div class="col">
    <!-- 待办事项 -->
    <section class="card c-sora">
      <h2>待办事项 <span class="count" id="todoCount"></span></h2>
      <div class="row">
        <input type="text" id="todoText" class="grow" placeholder="例如:倒垃圾、交水电费…" maxlength="60">
        <select id="todoMember"></select>
        <button class="btn" onclick="addTodo()">添加</button>
      </div>
      <ul id="todoList"></ul>
    </section>

    <!-- 购物清单 -->
    <section class="card">
      <h2>购物清单 <span class="count" id="shopCount"></span></h2>
      <div class="row">
        <input type="text" id="shopText" class="grow" placeholder="例如:鸡蛋、酱油、纸巾…" maxlength="40">
        <button class="btn" onclick="addShop()">添加</button>
      </div>
      <ul id="shopList"></ul>
    </section>
  </div>
</main>

<p class="savenote" id="saveNote">数据会自动保存,下次打开还在 ⸝⸝ 今天也要好好生活呀</p>
<div id="toast" role="status"></div>

<script>
/* ================= 数据与存储 ================= */
const KEY = 'family-hub:data';
const PALETTE = ['#E8B7BC','#9DB89A','#A9C3D4','#E6C079','#B8A6C9','#8FBFB2'];
let state = {
  members: [
    {id:'m1',name:'惠婷',color:PALETTE[0]},
    {id:'m2',name:'帅哥',color:PALETTE[2]}
  ],
  events: [], todos: [], shopping: [], notes: [],
  expenses: [], incomes: [], budget: {month:{}, year:{}}
};
let storageOK = false;

async function load(){
  try{
    if(window.storage){
      const r = await window.storage.get(KEY);
      if(r && r.value){ state = JSON.parse(r.value); }
      storageOK = true;
    }
  }catch(e){
    storageOK = !!window.storage;
  }
  if(!storageOK){
    document.getElementById('saveNote').textContent = '提示:当前环境不支持自动保存,刷新后数据会丢失。';
  }
  // 兼容旧数据
  state.expenses = state.expenses || [];
  state.incomes = state.incomes || [];
  // 预算结构升级:旧版是单一月度总额
  if(!state.budget || !state.budget.month){
    const old = (state.budget && typeof state.budget.monthly==='number') ? state.budget.monthly : 0;
    state.budget = { month: old>0 ? {'其他': old} : {}, year: {} };
  }
  // 支出类别对齐新项目
  state.expenses.forEach(e=>{
    if(e.cat==='日用') e.cat='日用百货';
    if(e.cat==='房租水电') e.cat='房贷';
  });
  migrateMembers();
  renderAll();
}
function migrateMembers(){
  // 修正旧数据里写错的名字
  state.members.forEach(m=>{ if(m.name==='拉慧婷'||m.name==='慧婷') m.name='惠婷'; });
  const wanted = [
    {name:'惠婷', color:PALETTE[0]},
    {name:'帅哥',  color:PALETTE[2]}
  ];
  wanted.forEach(w=>{
    if(!state.members.some(m=>m.name===w.name)){
      state.members.push({id:uid(), name:w.name, color:w.color});
    }
  });
  // 移除最初的占位成员"我"
  if(state.members.length>1) state.members = state.members.filter(m=>m.name!=='我');
}
let saveTimer=null;
function save(){
  if(!storageOK) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{ await window.storage.set(KEY, JSON.stringify(state)); }
    catch(e){ console.error('保存失败', e); }
  },250);
}
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* 轻提示(替代 alert) */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function flashErr(el){
  el.classList.add('err'); el.focus();
  setTimeout(()=>el.classList.remove('err'),1500);
}

/* ================= 顶栏:日期 & 成员 ================= */
function renderHeader(){
  const now = new Date();
  const weeks=['日','一','二','三','四','五','六'];
  document.getElementById('todayText').textContent =
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 · 星期'+weeks[now.getDay()];
  const h = now.getHours();
  const greet = h<5?'夜深了,早点休息哦':h<11?'早上好,今天也要元气满满':h<13?'中午好,记得好好吃饭':h<18?'下午好,喝杯茶歇一歇':'晚上好,辛苦一天啦';
  document.getElementById('greet').textContent = greet;

  const bar = document.getElementById('membersBar');
  bar.innerHTML = '';
  state.members.forEach(m=>{
    const chip = document.createElement('span');
    chip.className='member-chip';
    chip.innerHTML = '<span class="dot" style="background:'+m.color+'"></span>'+esc(m.name)+
      '<button title="移除成员" aria-label="移除'+esc(m.name)+'" onclick="removeMember(this,\''+m.id+'\')">×</button>';
    bar.appendChild(chip);
  });
  // 内嵌式添加成员
  const wrap = document.createElement('span');
  wrap.innerHTML = '<button class="add-member" onclick="this.style.display=\'none\';this.nextElementSibling.classList.add(\'open\');this.nextElementSibling.querySelector(\'input\').focus()">+ 添加成员</button>'+
    '<span class="inline-add"><input type="text" maxlength="10" placeholder="名字"><button class="btn small" onclick="confirmAddMember(this)">好</button></span>';
  bar.appendChild(wrap);
  wrap.querySelector('.inline-add input').addEventListener('keydown',e=>{
    if(e.key==='Enter') confirmAddMember(wrap.querySelector('.inline-add .btn'));
  });

  ['evMember','todoMember','noteMember','expMember'].forEach(id=>{
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = state.members.map(m=>'<option value="'+m.id+'">'+esc(m.name)+'</option>').join('');
    if([...sel.options].some(o=>o.value===prev)) sel.value=prev;
  });
}
function confirmAddMember(btn){
  const input = btn.parentElement.querySelector('input');
  const name = input.value.trim();
  if(!name){ flashErr(input); return; }
  state.members.push({id:uid(),name:name.slice(0,10),color:PALETTE[state.members.length%PALETTE.length]});
  save(); renderAll();
  toast('已添加成员「'+name+'」');
}
/* 两步确认移除(替代 confirm 弹窗) */
function removeMember(btn,id){
  if(state.members.length<=1){ toast('至少保留一位成员哦'); return; }
  if(!btn.classList.contains('confirming')){
    btn.classList.add('confirming'); btn.textContent='确认移除?';
    setTimeout(()=>{ btn.classList.remove('confirming'); btn.textContent='×'; },3000);
    return;
  }
  state.members = state.members.filter(x=>x.id!==id);
  save(); renderAll();
  toast('已移除成员');
}
const memberOf = id => state.members.find(m=>m.id===id);
const memberTag = id => {
  const m = memberOf(id);
  return m ? '<span class="dot" style="background:'+m.color+'"></span>'+esc(m.name) : '';
};

/* ================= 家庭日程 ================= */
function addEvent(){
  const t = document.getElementById('evTitle');
  const d = document.getElementById('evDate');
  if(!t.value.trim()){ flashErr(t); return; }
  if(!d.value){ toast('请选择日期'); flashErr(d); return; }
  state.events.push({
    id:uid(), title:t.value.trim(), date:d.value,
    time:document.getElementById('evTime').value,
    memberId:document.getElementById('evMember').value
  });
  t.value=''; document.getElementById('evTime').value='';
  save(); renderEvents();
}
function delEvent(id){ state.events=state.events.filter(e=>e.id!==id); save(); renderEvents(); }
function renderEvents(){
  const list = document.getElementById('evList');
  const todayStr = new Date().toLocaleDateString('sv');
  const evs = [...state.events].sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  document.getElementById('evCount').textContent = evs.length? '共 '+evs.length+' 项':'';
  if(!evs.length){ list.innerHTML='<li class="empty">还没有日程。添加第一条,比如周末的家庭活动 ⸜(๑˃ᴗ˂)⸝</li>'; return; }
  list.innerHTML = evs.map(e=>{

      '<div class="datechip '+(isToday?'today-chip':'')+'">'+

      '</div>'+
      '<div class="main">'+

        '<div class="meta">'+(e.time?e.time+' · ':'')+memberTag(e.memberId)+'</div>'+
      '</div>'+
      '<button class="del" aria-label="删除日程" onclick="delEvent(\''+e.id+'\')">✕</button>'+
    '</li>';
  }).join('');
}

/* ================= 家庭财务 ================= */
const CUR = '¥';
const fmt = n => CUR + Number(n).toLocaleString('zh-CN',{maximumFractionDigits:2});
const CATS_EXP = ['餐饮','交通','人情','房贷','娱乐','教育','医疗','日用百货','其他'];
const CATS_INC = ['工资','投资','兼职','红包','其他'];
const monthKey = () => new Date().toLocaleDateString('sv').slice(0,7);
const yearKey  = () => new Date().toLocaleDateString('sv').slice(0,4);
let budgetView = 'month';
let recType = 'exp';

/* 支出/收入切换 */
function setRecType(t){
  recType = t;
  document.getElementById('segExp').className = t==='exp' ? 'on-exp' : '';
  document.getElementById('segInc').className = t==='inc' ? 'on-inc' : '';
  const cats = t==='exp' ? CATS_EXP : CATS_INC;
  document.getElementById('expCat').innerHTML = cats.map(c=>'<option>'+c+'</option>').join('');
  document.getElementById('recBtn').textContent = t==='exp' ? '记支出' : '记收入';
}
/* 年度/月度切换 */
function switchBudgetView(v){
  budgetView = v;
  document.getElementById('tabYear').className  = v==='year' ? 'on' : '';
  document.getElementById('tabMonth').className = v==='month' ? 'on' : '';
  document.getElementById('budgetGrid').classList.remove('open');
  renderFinance();
}
/* 内嵌分项目预算编辑 */
function toggleBudgetEdit(){
  const grid = document.getElementById('budgetGrid');
  if(grid.classList.contains('open')){ grid.classList.remove('open'); return; }
  const b = state.budget[budgetView] || {};
  grid.innerHTML = CATS_EXP.map(c=>
    '<label>'+c+'<input type="text" inputmode="decimal" data-cat="'+c+'" value="'+(b[c]||'')+'" placeholder="0"></label>'
  ).join('') +
  '<span class="saverow"><button class="btn small" onclick="saveBudget()">保存'+(budgetView==='year'?'年度':'月度')+'预算</button></span>';
  grid.classList.add('open');
}
function saveBudget(){
  const grid = document.getElementById('budgetGrid');
  const b = {}; let bad = false;
  grid.querySelectorAll('input[data-cat]').forEach(inp=>{
    const v = inp.value.trim();
    if(v==='') return;
    const n = parseFloat(v);
    if(isNaN(n)||n<0){ flashErr(inp); bad = true; return; }
    if(n>0) b[inp.dataset.cat] = n;
  });
  if(bad){ toast('有的金额格式不对哦'); return; }
  state.budget[budgetView] = b;
  // 双向自动同步:月度 ↔ 年度
  if(budgetView==='month'){
    const y = {};
    Object.entries(b).forEach(([c,v])=>{ y[c] = Math.round(v*12*100)/100; });
    state.budget.year = y;
  }else{
    const m = {};
    Object.entries(b).forEach(([c,v])=>{ m[c] = Math.round(v/12*100)/100; });
    state.budget.month = m;
  }
  grid.classList.remove('open');
  save(); renderFinance();
  toast(budgetView==='year' ? '年度预算已保存,已自动分解到月度(÷12)' : '月度预算已保存,已自动归属年度(×12)');
}
/* 记一笔(支出或收入) */
function addRecord(){
  const a = document.getElementById('expAmount');
  const amount = parseFloat(a.value);
  if(!amount || amount<=0){ flashErr(a); toast('请输入正确的金额'); return; }
  const d = document.getElementById('expDate');
  const rec = {
    id:uid(), amount:Math.round(amount*100)/100,
    cat:document.getElementById('expCat').value,
    note:document.getElementById('expNote').value.trim(),
    memberId:document.getElementById('expMember').value,
    date: d.value || new Date().toLocaleDateString('sv'),
    ts:Date.now()
  };
  if(recType==='exp') state.expenses.push(rec); else state.incomes.push(rec);
  a.value=''; document.getElementById('expNote').value='';
  d.value = new Date().toLocaleDateString('sv');
  save(); renderFinance();
}
function delExpense(id){ state.expenses=state.expenses.filter(e=>e.id!==id); save(); renderFinance(); }
function delIncome(id){ state.incomes=state.incomes.filter(e=>e.id!==id); save(); renderFinance(); }

function renderFinance(){
  const mk = monthKey(), yk = yearKey();
  const mExp = state.expenses.filter(e=>e.date.startsWith(mk));
  const mInc = state.incomes.filter(e=>e.date.startsWith(mk));
  const mExpSum = mExp.reduce((s,e)=>s+e.amount,0);
  const mIncSum = mInc.reduce((s,e)=>s+e.amount,0);

  /* 本月收支结余 */
  document.getElementById('sumInc').textContent = fmt(mIncSum);
  document.getElementById('sumExp').textContent = fmt(mExpSum);
  const net = mIncSum - mExpSum;
  const netEl = document.getElementById('sumNet');
  netEl.textContent = (net<0?'-':'') + fmt(Math.abs(net));
  netEl.style.color = net<0 ? 'var(--danger)' : 'var(--matcha-deep)';

  /* 当前视图(年/月)的支出与预算 */
  const scopeExp = budgetView==='month' ? mExp : state.expenses.filter(e=>e.date.startsWith(yk));
  const spent = scopeExp.reduce((s,e)=>s+e.amount,0);
  const b = state.budget[budgetView] || {};
  const total = Object.values(b).reduce((s,v)=>s+v,0);
  const label = budgetView==='month' ? '本月' : '今年';

  const fill = document.getElementById('budgetFill');
  const stat = document.getElementById('budgetStat');
  if(total>0){
    const pct = Math.min(spent/total*100,100);
    fill.style.width = pct+'%';
    fill.style.background = spent>total ? 'var(--danger)' : pct>80 ? 'var(--anzu-deep)' : 'var(--matcha)';
    const left = total-spent;
    stat.innerHTML = '<span>'+label+'已用 <b>'+fmt(spent)+'</b> / 预算 '+fmt(total)+'</span>'+
      '<span style="color:'+(left<0?'var(--danger)':'var(--ink-soft)')+'">'+(left<0 ? '超支 '+fmt(-left) : '还剩 '+fmt(left))+'</span>';
  }else{
    fill.style.width = '0';
    stat.innerHTML = '<span style="color:var(--ink-soft)">还没设置'+(budgetView==='month'?'月度':'年度')+'预算 — 点"设置预算",给每个项目定个数吧</span>';
  }

  /* 分项目:预算 vs 已用 */
  const byCat = {};
  scopeExp.forEach(e=> byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
  // 始终显示全部项目,历史遗留类别有支出时也补充显示
  const rows = CATS_EXP.slice();
  Object.keys(byCat).forEach(c=>{ if(!rows.includes(c)) rows.push(c); });
  document.getElementById('budgetCats').innerHTML = rows.map(c=>{
    const used = byCat[c]||0, quota = b[c]||0;
    let w = 0, color = '#DDD3C0';
    if(quota>0){
      w = Math.min(used/quota*100,100);
      color = used>quota ? 'var(--danger)' : w>80 ? 'var(--anzu-deep)' : 'var(--matcha)';
    }else if(used>0){ w = 100; }
    return '<div class="bcat"><span class="cname">'+esc(c)+'</span>'+
      '<span class="bar"><i style="width:'+w.toFixed(1)+'%;background:'+color+'"></i></span>'+
      '<span class="cval">'+fmt(used)+(quota>0 ? ' / '+fmt(quota) : ' · 未设预算')+'</span></div>';
  }).join('');

  /* 最近收支列表 */
  const list = document.getElementById('expList');
  const all = state.expenses.map(e=>({...e,_t:'exp'}))
    .concat(state.incomes.map(e=>({...e,_t:'inc'})))
    .sort((a,b)=>b.ts-a.ts).slice(0,14);
  if(!all.length){
    list.innerHTML = '<li class="empty">还没有记账。记下第一笔收入或支出吧 ﹙˘ ³˘﹚</li>'; return;
  }
  list.innerHTML = all.map(e=>{
    const p = e.date.split('-');
    return '<li class="item">'+
      '<div class="main"><div class="title">'+esc(e.cat)+(e.note?' · '+esc(e.note):'')+'</div>'+
      '<div class="meta">'+(+p[1])+'月'+(+p[2])+'日 · '+memberTag(e.memberId)+'</div></div>'+
      '<span class="amt '+(e._t==='inc'?'inc':'')+'">'+(e._t==='inc'?'+':'−')+fmt(e.amount)+'</span>'+
      '<button class="del" aria-label="删除" onclick="'+(e._t==='inc'?'delIncome':'delExpense')+'(\''+e.id+'\')">✕</button>'+
    '</li>';
  }).join('');
}

/* ================= 待办事项 ================= */
function addTodo(){
  const t = document.getElementById('todoText');
  if(!t.value.trim()){ flashErr(t); return; }
  state.todos.push({id:uid(),text:t.value.trim(),memberId:document.getElementById('todoMember').value,done:false});
  t.value=''; save(); renderTodos();
}
function toggleTodo(id){ const x=state.todos.find(t=>t.id===id); if(x){x.done=!x.done; save(); renderTodos();} }
function delTodo(id){ state.todos=state.todos.filter(t=>t.id!==id); save(); renderTodos(); }
function renderTodos(){
  const list=document.getElementById('todoList');
  const open = state.todos.filter(t=>!t.done).length;
  document.getElementById('todoCount').textContent = state.todos.length? '还剩 '+open+' 件':'';
  if(!state.todos.length){ list.innerHTML='<li class="empty">暂时没有待办,享受清闲时光 ☕</li>'; return; }
  const sorted=[...state.todos].sort((a,b)=>a.done-b.done);
  list.innerHTML = sorted.map(t=>
    '<li class="item '+(t.done?'done':'')+'">'+
      '<input type="checkbox" '+(t.done?'checked':'')+' aria-label="完成" onchange="toggleTodo(\''+t.id+'\')">'+
      '<div class="main"><div class="title">'+esc(t.text)+'</div><div class="meta">'+memberTag(t.memberId)+'</div></div>'+
      '<button class="del" aria-label="删除待办" onclick="delTodo(\''+t.id+'\')">✕</button>'+
    '</li>').join('');
}

/* ================= 购物清单 ================= */
function addShop(){
  const t=document.getElementById('shopText');
  if(!t.value.trim()){ flashErr(t); return; }
  t.value.split(/[,,、]/).map(s=>s.trim()).filter(Boolean)
    .forEach(s=> state.shopping.push({id:uid(),text:s,done:false}));
  t.value=''; save(); renderShop();
}
function toggleShop(id){ const x=state.shopping.find(t=>t.id===id); if(x){x.done=!x.done; save(); renderShop();} }
function delShop(id){ state.shopping=state.shopping.filter(t=>t.id!==id); save(); renderShop(); }
function renderShop(){
  const list=document.getElementById('shopList');
  const open=state.shopping.filter(s=>!s.done).length;
  document.getElementById('shopCount').textContent = state.shopping.length? '待买 '+open+' 样':'';
  if(!state.shopping.length){ list.innerHTML='<li class="empty">清单是空的。小提示:可以用逗号一次添加多样,如"鸡蛋,牛奶,青菜"</li>'; return; }
  const sorted=[...state.shopping].sort((a,b)=>a.done-b.done);
  list.innerHTML = sorted.map(s=>
    '<li class="item '+(s.done?'done':'')+'">'+
      '<input type="checkbox" '+(s.done?'checked':'')+' aria-label="已购买" onchange="toggleShop(\''+s.id+'\')">'+
      '<div class="main"><div class="title">'+esc(s.text)+'</div></div>'+
      '<button class="del" aria-label="删除" onclick="delShop(\''+s.id+'\')">✕</button>'+
    '</li>').join('');
}

/* ================= 留言板 ================= */
function addNote(){
  const t=document.getElementById('noteText');
  if(!t.value.trim()){ flashErr(t); return; }
  state.notes.unshift({id:uid(),text:t.value.trim(),memberId:document.getElementById('noteMember').value,ts:Date.now()});
  state.notes = state.notes.slice(0,20);
  t.value=''; save(); renderNotes();
}
function delNote(id){ state.notes=state.notes.filter(n=>n.id!==id); save(); renderNotes(); }
function renderNotes(){
  const box=document.getElementById('noteList');
  if(!state.notes.length){ box.innerHTML='<p class="empty">还没有留言。第一张便利贴,贴给谁呢?♡</p>'; return; }
  box.innerHTML = state.notes.map(n=>{
    const d=new Date(n.ts);
    const when=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="note">'+
      '<div class="txt">'+esc(n.text)+'</div>'+
      '<div class="by"><span style="display:flex;align-items:center;gap:6px">'+memberTag(n.memberId)+' · '+when+'</span>'+
      '<button class="del" aria-label="删除留言" onclick="delNote(\''+n.id+'\')">✕</button></div>'+
    '</div>';
  }).join('');
}

/* ================= 启动 ================= */
function renderAll(){ renderHeader(); renderEvents(); renderTodos(); renderShop(); renderNotes(); renderFinance(); }
document.getElementById('todoText').addEventListener('keydown',e=>{ if(e.key==='Enter') addTodo(); });
document.getElementById('shopText').addEventListener('keydown',e=>{ if(e.key==='Enter') addShop(); });
document.getElementById('evTitle').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('evDate').focus(); });
document.getElementById('expNote').addEventListener('keydown',e=>{ if(e.key==='Enter') addRecord(); });
setRecType('exp');
switchBudgetView('month');
// 日期默认今天(跟随设备时钟,自动网络同步)
document.getElementById('evDate').value = new Date().toLocaleDateString('sv');
document.getElementById('expDate').value = new Date().toLocaleDateString('sv');
load();

  function ph(initial, tint){
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420">'
      + '<ellipse cx="150" cy="400" rx="95" ry="16" fill="rgba(0,0,0,.18)"/>'
      + '<circle cx="150" cy="120" r="70" fill="' + tint + '"/>'
      + '<rect x="85" y="190" width="130" height="170" rx="55" fill="' + tint + '"/>'
      + '<text x="150" y="140" font-family="Arial" font-size="52" font-weight="bold" fill="rgba(255,255,255,.95)" text-anchor="middle">' + initial + '</text>'
      + '<text x="150" y="392" font-family="Arial" font-size="17" font-weight="bold" fill="rgba(255,255,255,.95)" text-anchor="middle">Add image</text>'
      + '</svg>';
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  var chars = [
    { word:'MAMA', label:'Mama · The Heart', bg:'#79B865',
      desc:'Keeps every plan on track. Warm, sharp, and always two steps ahead.',
      img:IMG_MAMA, tint:'#4E8A3C' },
    { word:'PAPA', label:'Papa · The Rock', bg:'#5E8FB8',
      desc:'Fixes things, carries things, wins at peek-a-boo. Reliably awesome.',
      img:IMG_PAPA, tint:'#33608A' },
    { word:'MINI', label:'Mini · The Boss', bg:'#E58FAE',
      desc:'Two feet tall, runs the whole house. Payment accepted in hugs.',
      img:IMG_MINI, tint:'#C25A80' }
  ];

  var idx = 0;
  var hero = document.getElementById('familyHero');
  var word = document.getElementById('heroWord');
  var label = document.getElementById('heroLabel');
  var desc = document.getElementById('heroDesc');
  var main = document.getElementById('charMain');
  var sideL = document.getElementById('sideL');
  var sideR = document.getElementById('sideR');
  if(!hero || !main) return;

  function src(c){ return c.img; }
  function fallback(imgEl, c){
    imgEl.onerror = function(){ imgEl.onerror = null; imgEl.src = ph(c.word.charAt(0), c.tint); };
  }

  function render(){
    var c = chars[idx];
    var l = chars[(idx+2)%3];
    var r = chars[(idx+1)%3];
    hero.style.background = c.bg;
    word.textContent = c.word;
    label.textContent = c.label;
    desc.textContent = c.desc;
    main.classList.add('switching');
    setTimeout(function(){
      fallback(main, c); main.src = src(c);
      fallback(sideL, l); sideL.src = src(l);
      fallback(sideR, r); sideR.src = src(r);
      main.classList.remove('switching');
    }, 180);
  }

  document.getElementById('prevChar').addEventListener('click', function(){ idx = (idx+2)%3; render(); });
  document.getElementById('nextChar').addEventListener('click', function(){ idx = (idx+1)%3; render(); });
  sideL.addEventListener('click', function(){ idx = (idx+2)%3; render(); });
  sideR.addEventListener('click', function(){ idx = (idx+1)%3; render(); });

  var pod = document.getElementById('charPod');
  var drag = false, sx = 0, deg = 0, holdTimer = null;
  pod.addEventListener('pointerdown', function(e){
    drag = true; sx = e.clientX; pod.classList.add('dragging');
    var m = /rotateY\((-?[\d.]+)deg\)/.exec(main.style.transform || '');
    deg = m ? parseFloat(m[1]) : 0;
    e.preventDefault();
  });
  window.addEventListener('pointermove', function(e){
    if(!drag) return;
    deg += (e.clientX - sx) * 0.35; sx = e.clientX;
    if(deg > 55) deg = 55; if(deg < -55) deg = -55;
    main.style.transform = 'rotateY(' + deg + 'deg)';
  });
  window.addEventListener('pointerup', function(){
    if(!drag) return;
    drag = false; pod.classList.remove('dragging'); pod.classList.add('held');
    clearTimeout(holdTimer);
    holdTimer = setTimeout(function(){
      main.style.transform = ''; pod.classList.remove('held');
    }, 2400);
  });

  var c0 = chars[0];
  fallback(main, c0); main.src = src(c0);
  fallback(sideL, chars[2]); sideL.src = src(chars[2]);
  fallback(sideR, chars[1]); sideR.src = src(chars[1]);
  hero.style.background = c0.bg;
  desc.textContent = c0.desc;
})();
</script>
